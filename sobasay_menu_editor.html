<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#111111" />
<title>sobasay menu — A3 editor</title>
<style>
  :root {
    --ink: #1A1A1A;
    --sub: #555;
    --hair: #BFBFBF;
    --photo-bg: #EEE;
    --photo-bd: #D6D6D6;
    --price: #8B1A1A;
    --tool: #111;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #f3f3f3;
    font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", "Helvetica Neue", Arial, sans-serif;
    color: var(--ink);
  }

  /* Toolbar (screen only) */
  .toolbar {
    position: sticky; top: 0; z-index: 50;
    background: var(--tool); color: #fff;
    padding: 10px 16px;
    display: flex; gap: 12px; align-items: center;
    box-shadow: 0 1px 0 rgba(0,0,0,.1);
  }
  .toolbar h1 { font-size: 14px; font-weight: 600; margin: 0 8px 0 0; letter-spacing: .04em; }
  .toolbar button {
    background: #fff; color: var(--tool);
    border: 0; border-radius: 6px; padding: 7px 14px;
    font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .toolbar button.ghost { background: transparent; color: #fff; border: 1px solid #555; }
  .toolbar .spacer { flex: 1; }
  .toolbar .hint { font-size: 12px; color: #aaa; }

  /* Stage that scales the A3 page on screen */
  .stage {
    display: flex; justify-content: center;
    padding: 24px 16px 60px;
  }
  .scaler {
    transform-origin: top center;
    transform: scale(var(--scale, 0.55));
  }

  /* The A3 page */
  .page {
    width: 297mm; height: 420mm;
    background: #fff;
    box-shadow: 0 8px 24px rgba(0,0,0,.12);
    position: relative;
    padding: 18mm 14mm 14mm;
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .hair {
    height: 1px; background: var(--hair); margin: 0 4mm;
  }
  .header {
    padding: 4mm 0 2mm;
    text-align: center;
  }
  .wordmark {
    width: 78%; max-width: 220mm;
    height: auto; display: block; margin: 6mm auto 0;
  }
  .tagline {
    font-family: Georgia, "Times New Roman", serif;
    color: var(--sub);
    font-size: 14pt;
    letter-spacing: .8em;
    padding-left: .8em;            /* compensate trailing letter-spacing */
    margin: 4mm 0 4mm;
  }

  /* Grid */
  .grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 4mm 4mm;
    padding: 4mm 0 0;
  }
  .cell {
    display: flex; flex-direction: column;
  }
  .photo {
    position: relative;
    aspect-ratio: 4 / 3;
    background: var(--photo-bg);
    border: 0.5px solid var(--photo-bd);
    overflow: hidden;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    touch-action: none;     /* let pointer events handle pinch/pan */
  }
  .photo .img {
    position: absolute; top: 0; left: 0;
    transform-origin: top left;
    pointer-events: none;
    -webkit-user-drag: none; user-select: none;
    display: block;
  }
  .photo:not(.has-image) .img { display: none; }
  .photo .label {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: #9A9A9A; font-size: 11pt; font-weight: 700; letter-spacing: .4em;
    pointer-events: none;
  }
  .photo.has-image .label { display: none; }
  .photo.has-image { cursor: grab; }
  .photo.dragging { cursor: grabbing; }

  /* photo control buttons (screen only) */
  .photo .pcontrols {
    position: absolute; right: 4px; bottom: 4px; z-index: 3;
    display: none; gap: 4px;
  }
  .photo.has-image:hover .pcontrols { display: flex; }
  .photo .pcontrols button {
    background: rgba(0,0,0,.65); color: #fff; border: 0;
    width: 22px; height: 22px; border-radius: 4px;
    font-size: 13px; line-height: 1; cursor: pointer;
    display: flex; align-items: center; justify-content: center; padding: 0;
  }
  .photo .pcontrols button:hover { background: rgba(0,0,0,.85); }

  .photo .hint-bar {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 2;
    background: rgba(0,0,0,.55); color: #fff;
    font-size: 8.5pt; padding: 3px 6px; text-align: center;
    pointer-events: none; opacity: 0; transition: opacity .15s;
  }
  .photo:hover .hint-bar { opacity: 1; }
  .photo:not(.has-image) .hint-bar::before { content: "タップで写真を選択"; }
  .photo.has-image .hint-bar::before { content: "ドラッグで移動 ・ ホイール/ピンチで拡大縮小"; }

  /* Touch devices: keep controls visible, hide hover-only hints */
  @media (hover: none), (pointer: coarse) {
    .photo.has-image .pcontrols { display: flex !important; }
    .photo .pcontrols button { width: 30px; height: 30px; font-size: 16px; }
    .photo .hint-bar { display: none; }
  }

  /* Mobile / narrow toolbar */
  @media (max-width: 640px) {
    .toolbar { flex-wrap: wrap; gap: 8px; padding: 8px 10px; }
    .toolbar h1 { font-size: 12px; }
    .toolbar .hint { display: none; }
    .toolbar button { padding: 8px 12px; font-size: 12px; }
    .stage { padding: 12px 4px 40px; }
  }

  .name {
    font-size: 13pt; font-weight: 700; color: var(--ink);
    margin: 2mm 0 0;
    outline: none; min-height: 1.2em;
  }
  .price {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 12pt; font-weight: 700; color: var(--price);
    margin: 1mm 0 0;
    outline: none; min-height: 1.2em;
  }
  .desc {
    font-size: 8.5pt; color: var(--sub); line-height: 1.55;
    margin: 1mm 0 0; flex: 1;
    outline: none;
  }
  @media (hover: none), (pointer: coarse) {
    .desc { font-size: 16px; }
  }

  /* contenteditable placeholder */
  [contenteditable=true]:empty:before {
    content: attr(data-ph);
    color: #BBB;
  }
  [contenteditable=true]:focus { outline: 1px dashed #8AB; outline-offset: 2px; }

  /* Footer */
  .footer { padding: 3mm 0 0; text-align: center; }
  .mark { width: 9mm; height: 9mm; object-fit: contain; opacity: .85; margin-top: 3mm; }

  /* PRINT */
  @page { size: A3 portrait; margin: 0; }
  @media print {
    html, body { background: #fff !important; }
    .toolbar, .stage > .meta { display: none !important; }
    .stage { padding: 0 !important; }
    .scaler { transform: none !important; }
    .page { box-shadow: none !important; }
    .photo { cursor: default !important; }
    .photo .pcontrols, .photo .hint-bar { display: none !important; }
    [contenteditable=true]:focus { outline: none !important; }
  }
</style>
</head>

<div class="toolbar">

  <button onclick="window.print()">PDFで保存 / 印刷</button>

<input type="file" id="filePicker" accept="image/*" style="display:none"/>

<script>
  const grid = document.getElementById('grid');
  const filePicker = document.getElementById('filePicker');
  let activePhoto = null;

  // Per-cell pan/zoom state
  const states = new Map();   // photo element -> { img, natW, natH, scale, baseScale, tx, ty }

  function getStageScale() {
    const t = getComputedStyle(document.querySelector('.scaler')).transform;
    if (!t || t === 'none') return 1;
    const m = t.match(/matrix\(([^,]+),/);
    return m ? parseFloat(m[1]) || 1 : 1;
  }

  function makeCell(i) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.innerHTML = `
      <div class="photo" data-idx="${i}">
        <img class="img" alt="" draggable="false"/>
        <div class="label">PHOTO ${i}</div>
        <div class="pcontrols">
          <button title="拡大" data-act="zin">＋</button>
          <button title="縮小" data-act="zout">−</button>
          <button title="中央に戻す" data-act="reset">⤺</button>
          <button title="差し替え" data-act="replace">↻</button>
        </div>
        <div class="hint-bar"></div>
      </div>
      <div class="name" contenteditable="true" data-ph="メニュー名"></div>
      <div class="price" contenteditable="true" data-ph="¥0,000"></div>
      <div class="desc" contenteditable="true" data-ph="説明文をここに入力してください。素材のこだわりや味の特徴などを2〜3行で。"></div>
    `;
    const photo = cell.querySelector('.photo');

    // Click empty cell -> file picker
    photo.addEventListener('click', (e) => {
      if (e.target.closest('.pcontrols')) return;
      if (photo.classList.contains('dragging') || photo.dataset.moved === '1') {
        photo.dataset.moved = '0';
        return;
      }
      if (!photo.classList.contains('has-image')) {
        activePhoto = photo; filePicker.value = ""; filePicker.click();
      }
    });
    photo.addEventListener('dblclick', (e) => {
      if (e.target.closest('.pcontrols')) return;
      activePhoto = photo; filePicker.value = ""; filePicker.click();
    });

    // ----- Pointer events: single-finger pan / two-finger pinch -----
    const pmap = new Map();   // pointerId -> { x, y }
    let gesture = null;       // pinch gesture snapshot

    function localPoint(clientX, clientY) {
      const rect = photo.getBoundingClientRect();
      const ss = getStageScale();
      return { x: (clientX - rect.left) / ss, y: (clientY - rect.top) / ss };
    }

    photo.addEventListener('pointerdown', (e) => {
      if (e.target.closest('.pcontrols')) return;
      try { photo.setPointerCapture(e.pointerId); } catch (_) {}
      pmap.set(e.pointerId, { x: e.clientX, y: e.clientY });
      photo.dataset.moved = '0';
      if (photo.classList.contains('has-image')) photo.classList.add('dragging');

      if (pmap.size === 2 && photo.classList.contains('has-image')) {
        const pts = [...pmap.values()];
        const a = localPoint(pts[0].x, pts[0].y);
        const b = localPoint(pts[1].x, pts[1].y);
        const dist = Math.hypot(a.x - b.x, a.y - b.y);
        const mid  = { x: (a.x + b.x)/2, y: (a.y + b.y)/2 };
        const st = states.get(photo);
        gesture = {
          startDist: dist,
          startScale: st.scale,
          startTx: st.tx,
          startTy: st.ty,
          startMid: mid
        };
      }
    });

    photo.addEventListener('pointermove', (e) => {
      if (!pmap.has(e.pointerId)) return;
      const prev = pmap.get(e.pointerId);
      pmap.set(e.pointerId, { x: e.clientX, y: e.clientY });
      const st = states.get(photo);

      if (pmap.size === 1) {
        if (!photo.classList.contains('has-image') || !st) return;
        const ss = getStageScale();
        const dx = (e.clientX - prev.x) / ss;
        const dy = (e.clientY - prev.y) / ss;
        if (Math.abs(dx) + Math.abs(dy) > 0.5) photo.dataset.moved = '1';
        st.tx += dx; st.ty += dy;
        clampAndApply(photo);
      } else if (pmap.size >= 2 && gesture && st) {
        const pts = [...pmap.values()];
        const a = localPoint(pts[0].x, pts[0].y);
        const b = localPoint(pts[1].x, pts[1].y);
        const dist = Math.hypot(a.x - b.x, a.y - b.y);
        const mid  = { x: (a.x + b.x)/2, y: (a.y + b.y)/2 };
        const targetScale = Math.max(st.baseScale, Math.min(st.baseScale * 8, gesture.startScale * (dist / gesture.startDist)));
        const k = targetScale / gesture.startScale;
        // Map gesture's start midpoint to the current mid while applying the new scale
        st.tx = mid.x - (gesture.startMid.x - gesture.startTx) * k;
        st.ty = mid.y - (gesture.startMid.y - gesture.startTy) * k;
        st.scale = targetScale;
        photo.dataset.moved = '1';
        clampAndApply(photo);
      }
    });

    function endPointer(e) {
      if (pmap.has(e.pointerId)) pmap.delete(e.pointerId);
      if (pmap.size < 2) gesture = null;
      if (pmap.size === 0) photo.classList.remove('dragging');
    }
    photo.addEventListener('pointerup', endPointer);
    photo.addEventListener('pointercancel', endPointer);
    photo.addEventListener('lostpointercapture', endPointer);

    // Wheel (zoom on desktop / trackpad)
    photo.addEventListener('wheel', (e) => {
      if (!photo.classList.contains('has-image')) return;
      e.preventDefault();
      const st = states.get(photo);
      if (!st) return;
      const p = localPoint(e.clientX, e.clientY);
      const factor = e.deltaY < 0 ? 1.08 : 1/1.08;
      const newScale = Math.max(st.baseScale, Math.min(st.baseScale * 8, st.scale * factor));
      const k = newScale / st.scale;
      st.tx = p.x - (p.x - st.tx) * k;
      st.ty = p.y - (p.y - st.ty) * k;
      st.scale = newScale;
      clampAndApply(photo);
    }, { passive: false });

    // Control buttons
    photo.querySelector('[data-act="zin"]').addEventListener('click',  (e) => { e.stopPropagation(); zoomCenter(photo, 1.15); });
    photo.querySelector('[data-act="zout"]').addEventListener('click', (e) => { e.stopPropagation(); zoomCenter(photo, 1/1.15); });
    photo.querySelector('[data-act="reset"]').addEventListener('click', (e) => { e.stopPropagation(); resetPhoto(photo); });
    photo.querySelector('[data-act="replace"]').addEventListener('click', (e) => {
      e.stopPropagation(); activePhoto = photo; filePicker.value = ""; filePicker.click();
    });

    // Drag & drop file onto cell
    photo.addEventListener('dragover', (e) => { e.preventDefault(); });
    photo.addEventListener('drop', (e) => {
      e.preventDefault();
      const file = e.dataTransfer.files && e.dataTransfer.files[0];
      if (file) loadIntoPhoto(photo, file);
    });

    return cell;
  }

  for (let i = 1; i <= 9; i++) grid.appendChild(makeCell(i));

  filePicker.addEventListener('change', (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file || !activePhoto) return;
    loadIntoPhoto(activePhoto, file);
  });

  function loadIntoPhoto(photo, file) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = photo.querySelector('.img');
      img.onload = () => {
        const natW = img.naturalWidth, natH = img.naturalHeight;
        const cw = photo.clientWidth, ch = photo.clientHeight;
        const baseScale = Math.max(cw / natW, ch / natH);
        img.style.width  = natW + 'px';
        img.style.height = natH + 'px';
        const tx = (cw - natW * baseScale) / 2;
        const ty = (ch - natH * baseScale) / 2;
        states.set(photo, { img, natW, natH, scale: baseScale, baseScale, tx, ty });
        photo.classList.add('has-image');
        applyTransform(photo);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  function clampAndApply(photo) {
    const st = states.get(photo);
    if (!st) return;
    const cw = photo.clientWidth, ch = photo.clientHeight;
    const w = st.natW * st.scale, h = st.natH * st.scale;
    if (w <= cw) st.tx = (cw - w) / 2; else st.tx = Math.min(0, Math.max(cw - w, st.tx));
    if (h <= ch) st.ty = (ch - h) / 2; else st.ty = Math.min(0, Math.max(ch - h, st.ty));
    applyTransform(photo);
  }
  function applyTransform(photo) {
    const st = states.get(photo);
    if (!st) return;
    st.img.style.transform = `translate(${st.tx}px, ${st.ty}px) scale(${st.scale})`;
  }
  function zoomCenter(photo, factor) {
    const st = states.get(photo);
    if (!st) return;
    const cw = photo.clientWidth, ch = photo.clientHeight;
    const cx = cw/2, cy = ch/2;
    const newScale = Math.max(st.baseScale, Math.min(st.baseScale * 6, st.scale * factor));
    const k = newScale / st.scale;
    st.tx = cx - (cx - st.tx) * k;
    st.ty = cy - (cy - st.ty) * k;
    st.scale = newScale;
    clampAndApply(photo);
  }
  function resetPhoto(photo) {
    const st = states.get(photo);
    if (!st) return;
    const cw = photo.clientWidth, ch = photo.clientHeight;
    st.scale = st.baseScale;
    st.tx = (cw - st.natW * st.scale) / 2;
    st.ty = (ch - st.natH * st.scale) / 2;
    applyTransform(photo);
  }

  function resetAll() {
    if (!confirm('全ての写真と文字を初期状態に戻しますか？')) return;
    document.querySelectorAll('.photo').forEach(p => {
      const img = p.querySelector('.img');
      if (img) { img.removeAttribute('src'); img.style.transform = ''; img.style.width = ''; img.style.height = ''; }
      p.classList.remove('has-image');
      states.delete(p);
    });
    document.querySelectorAll('[contenteditable=true]').forEach(el => el.textContent = '');
  }

  // Auto-fit screen scale (responsive: mobile or desktop)
  function fitScale() {
    const stage = document.querySelector('.scaler');
    const toolbar = document.querySelector('.toolbar');
    const tbH = toolbar ? toolbar.getBoundingClientRect().height : 80;
    const pad = window.innerWidth < 640 ? 16 : 60;
    const wMax = (window.innerWidth - pad) / (297 * 3.7795);
    const hMax = (window.innerHeight - tbH - 40) / (420 * 3.7795);
    // Prefer width-fit on mobile so the page is fully readable
    const cap = window.innerWidth < 640 ? 1.0 : 0.85;
    const s = Math.min(wMax, hMax, cap);
    const finalS = Math.max(0.18, s);
    stage.style.setProperty('--scale', finalS.toFixed(3));
    const sh = 420 * 3.7795 * finalS + 60;
    document.querySelector('.stage').style.minHeight = sh + 'px';
  }
  window.addEventListener('resize', _updateScale);
  window.addEventListener('orientationchange', _updateScale);
  fitScale();
  // Re-run after layout settles (mobile address bar etc.)
  setTimeout(_updateScale, 100);
  setTimeout(_updateScale, 500);

  // ── Dynamic page size ───────────────────────────────────────────────
  let _pageW = 297, _pageH = 420;

  function _updateScale() {
    const stage   = document.querySelector('.scaler');
    const toolbar = document.querySelector('.toolbar');
    const tbH = toolbar ? toolbar.getBoundingClientRect().height : 80;
    const pad = window.innerWidth < 640 ? 16 : 60;
    const PX  = 3.7795;
    const wMax = (window.innerWidth  - pad)    / (_pageW * PX);
    const hMax = (window.innerHeight - tbH - 40) / (_pageH * PX);
    const cap  = window.innerWidth < 640 ? 1.0 : 0.85;
    const s    = Math.max(0.18, Math.min(wMax, hMax, cap));
    stage.style.setProperty('--scale', s.toFixed(3));
    document.querySelector('.stage').style.minHeight = (_pageH * PX * s + 60) + 'px';
  }
  // Override resize listeners so dynamic dimensions are used
  window.addEventListener('resize',            _updateScale);
  window.addEventListener('orientationchange', _updateScale);
  setTimeout(_updateScale, 600);

  function _applyPageSize(w, h) {
    _pageW = w; _pageH = h;
    const p = document.getElementById('page');
    if (p) { p.style.width = w + 'mm'; p.style.height = h + 'mm'; }
    let st = document.getElementById('_dynpage');
    if (!st) { st = document.createElement('style'); st.id = '_dynpage'; document.head.appendChild(st); }
    st.textContent = '@page { size: ' + w + 'mm ' + h + 'mm; margin: 0; }';
    _updateScale();
  }

  window.addEventListener('message', e => {
    if (e.data && e.data.type === 'setPaperSize') _applyPageSize(e.data.w, e.data.h);
  });

  // ── localStorage save / restore ────────────────────────────────────
  const _LS = 'sobasay_horizontal';

  function _compress(src, maxPx, q) {
    return new Promise(resolve => {
      if (!src || !src.startsWith('data:')) return resolve(null);
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxPx || h > maxPx) {
          if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
          else       { w = Math.round(w * maxPx / h); h = maxPx; }
        }
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL('image/jpeg', q));
      };
      img.onerror = () => resolve(null);
      img.src = src;
    });
  }

  let _saving = false;
  async function _save() {
    if (_saving) return; _saving = true;
    try {
      const raw = [];
      document.querySelectorAll('.photo').forEach(p => {
        const st  = states.get(p);
        const img = p.querySelector('.img');
        raw.push({
          idx: p.dataset.idx,
          src: (st && img && img.src && img.src.startsWith('data:')) ? img.src : null,
          tx: st ? st.tx : 0, ty: st ? st.ty : 0,
          scale: st ? st.scale : 1, baseScale: st ? st.baseScale : 1,
          natW: st ? st.natW : 0, natH: st ? st.natH : 0
        });
      });

      const cells = [];
      document.querySelectorAll('.cell').forEach(cell => {
        cells.push({
          name:  cell.querySelector('.name').innerHTML,
          price: cell.querySelector('.price').innerHTML,
          desc:  cell.querySelector('.desc').innerHTML
        });
      });

      const photos = await Promise.all(raw.map(async p => ({
        ...p, src: p.src ? await _compress(p.src, 800, 0.72) : null
      })));

      const data = { photos, cells, pageW: _pageW, pageH: _pageH, ts: Date.now() };
      try {
        localStorage.setItem(_LS, JSON.stringify(data));
      } catch {
        data.photos = photos.map(p => ({ ...p, src: null }));
        try { localStorage.setItem(_LS, JSON.stringify(data)); } catch {}
      }
    } finally { _saving = false; }
  }

  function _restore() {
    try {
      const raw = localStorage.getItem(_LS);
      if (!raw) return;
      const data = JSON.parse(raw);

      if (data.pageW && data.pageH) _applyPageSize(data.pageW, data.pageH);

      if (data.cells) {
        document.querySelectorAll('.cell').forEach((cell, i) => {
          const d = data.cells[i]; if (!d) return;
          if (d.name  !== undefined) cell.querySelector('.name').innerHTML  = d.name;
          if (d.price !== undefined) cell.querySelector('.price').innerHTML = d.price;
          if (d.desc  !== undefined) cell.querySelector('.desc').innerHTML  = d.desc;
        });
      }

      if (data.photos) {
        data.photos.forEach(pd => {
          if (!pd || !pd.src) return;
          const photo = document.querySelector(`.photo[data-idx="${pd.idx}"]`);
          if (!photo) return;
          const img = photo.querySelector('.img');
          img.onload = () => {
            const cw = photo.clientWidth  || 200;
            const ch = photo.clientHeight || 150;
            states.set(photo, {
              img, natW: img.naturalWidth, natH: img.naturalHeight,
              scale: pd.scale || Math.max(cw / img.naturalWidth, ch / img.naturalHeight),
              baseScale: pd.baseScale || Math.max(cw / img.naturalWidth, ch / img.naturalHeight),
              tx: pd.tx || 0, ty: pd.ty || 0
            });
            photo.classList.add('has-image');
            applyTransform(photo);
          };
          img.src = pd.src;
        });
      }
    } catch(e) { console.warn('sobasay_h restore:', e); }
  }

  // Auto-save
  let _saveTimer = null;
  function _scheduleSave() { clearTimeout(_saveTimer); _saveTimer = setTimeout(_save, 2000); }
  document.addEventListener('input', _scheduleSave);
  new MutationObserver(_scheduleSave).observe(document.getElementById('grid'), {
    subtree: true, attributes: true, attributeFilter: ['src', 'style', 'class']
  });

  setTimeout(_restore, 150);
</script>
</body>
</html>
